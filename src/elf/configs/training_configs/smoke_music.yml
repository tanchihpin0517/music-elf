modality: music
data_path: "data/music_dataset"
tokenizer_path: "data/music_dataset/tokenizer.json"
encoder_type: t5_scratch
encoder_d_model: 512
encoder_seed: 0
latent_mean: 0.030714
latent_std: 0.999528

max_length: 256
max_train_examples: 64
pad_token: pad
model: ELF-B
optimizer: muon
epochs: 1
global_batch_size: 8
blr: 0.001
warmup_steps: 10
ema_decay1: 0.9999
gradient_checkpointing: true
use_bf16: true

online_eval: false
eval_freq: 9999
num_samples: 0
use_wandb: false
log_freq: 10
save_freq: 1
num_workers: 2
output_dir: outputs/elf_b-music-smoke
seed: 42
